<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Apple Products 2026 | Future Tech Showcase</title>
    
    <meta name="description" content="Explore the official 2026 Apple lineup. Featuring the all-new iPhone 17 with Titanium finish, MacBook Neo with M5 chip, and the latest redesigned iPad Air.">
    
    <meta name="keywords" content="Apple 2026, iPhone 17, MacBook Neo, M5 chip, iPad Air">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://example.com/">

    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --link-color: #0066cc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        nav { background: rgba(29, 29, 31, 0.98); padding: 1rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); }
        nav ul { display: flex; gap: 2rem; justify-content: center; list-style: none; }
        nav a { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 8px; }

        .hero { text-align: center; padding: 100px 20px; background: #000; color: #fff; }
        /* Зөвхөн ганц H1 ашиглав */
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 1rem; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        /* Бусад гарчгуудыг H2 болгов */
        .card h2 { font-size: 2rem; margin-bottom: 1rem; }
        .card img { width: 100%; height: auto; border-radius: 12px; margin-bottom: 2rem; aspect-ratio: 16/10; object-fit: cover; }

        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            background: var(--link-color);
            color: #fff;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
        }
        footer { padding: 40px; text-align: center; border-top: 1px solid #d2d2d7; font-size: 0.9rem; color: #6e6e73; }
    </style>
</head>
<body>

    <header>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="#iphone">iPhone</a></li>
                <li><a href="#mac">Mac</a></li>
                <li><a href="#ipad">iPad</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero">
            <h1>Apple Products 2026</h1>
            <p>Innovation for the next generation.</p>
        </section>

        <section class="products-grid">
            <article class="card" id="iphone">
                <h2>iPhone 17</h2>
                <img src="https://images.unsplash.com/photo-1696446701796-da61225697cc?w=600" alt="iPhone 17 Titanium">
                <p style="margin-bottom: 1.5rem;">The most powerful iPhone yet.</p>
                <a href="https://www.apple.com/iphone/" class="cta-button">Learn More</a>
            </article>

            <article class="card" id="mac">
                <h2>MacBook Neo</h2>
                <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600" alt="MacBook Neo M5">
                <p style="margin-bottom: 1.5rem;">Supercharged by the M5 chip.</p>
                <a href="https://www.apple.com/mac/" class="cta-button">Learn More</a>
            </article>

            <article class="card" id="ipad">
                <h2>iPad Air</h2>
                <img src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=600" alt="iPad Air 2026">
                <p style="margin-bottom: 1.5rem;">Thin, light, and powerful.</p>
                <a href="https://www.apple.com/ipad/" class="cta-button">Learn More</a>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Future Tech Project. All rights reserved.</p>
    </footer>

</body>
</html>
